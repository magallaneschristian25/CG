<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS Grid Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header class="header">
        <h1>My Grid Website</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero (Spanning Section) -->
    <section class="hero">
        <h2>Welcome to My Website</h2>
        <p>This hero section spans all columns.</p>
    </section>

    <!-- Main Content -->
    <main class="main">

        <!-- Cards -->
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>

        <!-- Spanning Card -->
        <div class="card wide">Wide Card (Spans 2 Columns)</div>

        <div class="card">Card 4</div>
        <div class="card">Card 5</div>

    </main>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h3>Sidebar</h3>
        <p>Extra info, links, or ads go here.</p>
    </aside>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Grid Layout Demo | All Rights Reserved</p>
    </footer>

</div>

</body>
</html>
